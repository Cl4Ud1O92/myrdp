name: RDP-Gdrive-Universal-Desktop

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "Password-Gdrive-2026!" 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -Description "RDP User"
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tools (Tailscale, Rclone, WinFsp)
        run: |
          choco install tailscale rclone winfsp -y

      - name: Configure Rclone Config
        run: |
          $configContent = @"
          ${{ secrets.RCLONE_CONFIG_CONTENT }}
          "@
          # Salviamo il config in una posizione accessibile a tutti
          $sharedConfigPath = "C:\rclone.conf"
          Set-Content -Path $sharedConfigPath -Value $configContent
          icacls $sharedConfigPath /grant "Everyone:(R,W)"

      - name: Establish Tailscale Connection
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-win
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Setup Cloud Mounter on ALL Desktops
        run: |
          # Cerchiamo tutti i desktop presenti nel sistema
          $userProfiles = Get-ChildItem "C:\Users"
          
          foreach ($profile in $userProfiles) {
              $desktopPath = Join-Path $profile.FullName "Desktop"
              if (Test-Path $desktopPath) {
                  $batPath = Join-Path $desktopPath "ATTIVA-GOOGLE-DRIVE.bat"
                  $batContent = @"
          @echo off
          echo ===========================================
          echo AVVIO COLLEGAMENTO GOOGLE DRIVE (Z:)
          echo ===========================================
          taskkill /f /im rclone.exe >nul 2>&1
          start /b "" "rclone" mount cla: Z: --vfs-cache-mode full --config "C:\rclone.conf"
          echo Attendere 15 secondi...
          timeout /t 15
          if exist Z:\ (
              explorer Z:
          ) else (
              echo ERRORE: Disco Z non apparso. Controlla i segreti di GitHub.
              pause
          )
          exit
          "@
                  Set-Content -Path $batPath -Value $batContent
                  icacls $batPath /grant "Everyone:(F)"
              }
          }

      - name: Maintain Connection
        run: |
          Write-Host "`n==============================="
          Write-Host " ACCESSO RDP PRONTO"
          Write-Host " IP TAILSCALE: $env:TAILSCALE_IP"
          Write-Host " PASSWORD: $env:RDP_PASS"
          Write-Host "==============================="
          Write-Host " Cerca il file 'ATTIVA-GOOGLE-DRIVE' sul Desktop e avvialo."
          
          while ($true) {
              Start-Sleep -Seconds 300
          }
