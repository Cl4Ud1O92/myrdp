name: RDP-GoogleDrive

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360  # Il limite reale di GitHub è 6 ore (360 min)

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "GitHubRDP123!" # Password fissa per semplicità nei test, cambiala se vuoi
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale, Rclone and WinFsp
        run: |
          # Installazione multipla via Chocolatey
          choco install tailscale rclone winfsp -y

      - name: Configure Rclone
        run: |
          # Configuriamo rclone per l'utente System e per l'utente RDP
          $configPaths = @(
            "$env:USERPROFILE\.config\rclone\rclone.conf",
            "C:\Users\RDP\.config\rclone\rclone.conf"
          )
          foreach ($path in $configPaths) {
            New-Item -ItemType Directory -Force -Path (Split-Path $path)
            Set-Content -Path $path -Value @"
          ${{ secrets.RCLONE_CONFIG_CONTENT }}
          "@
          }

      - name: Establish Tailscale Connection
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-win
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Mount Google Drive (Global Mode)
        run: |
          # Creiamo un punto di mount che sia visibile all'utente RDP
          # Usiamo l'opzione --dir-cache-time per velocizzare
          Start-Process rclone -ArgumentList "mount", "cla:", "Z:", `
            "--vfs-cache-mode", "full", `
            "--vfs-cache-max-size", "2G", `
            "--allow-other" -WindowStyle Hidden
          
          # Creiamo anche un link simbolico sul desktop dell'utente RDP come backup
          Start-Sleep -Seconds 10
          $desktopPath = "C:\Users\RDP\Desktop\GoogleDrive"
          New-Item -ItemType Junction -Path $desktopPath -Target "Z:\" -ErrorAction SilentlyContinue

      - name: Maintain Connection
        run: |
          Write-Host "`n=== DATI ACCESSO RDP ==="
          Write-Host "IP Tailscale: $env:TAILSCALE_IP"
          Write-Host "Utente: RDP"
          Write-Host "Password: $env:RDP_PASS"
          Write-Host "Disco Cloud: Z: (o cartella GoogleDrive sul Desktop)"
          Write-Host "========================`n"
          
          while ($true) {
              Write-Host "[$(Get-Date)] Runner Attivo... (Il disco Z: dovrebbe essere visibile)"
              Start-Sleep -Seconds 300
          }
