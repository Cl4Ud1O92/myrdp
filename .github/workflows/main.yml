name: RDP-Gdrive-Final-Edition

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "Password-Gdrive-2026!" 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -Description "RDP User"
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tools (Tailscale, Rclone, WinFsp)
        run: |
          choco install tailscale rclone winfsp -y

      - name: Configure Rclone for User RDP
        run: |
          $configContent = @"
          ${{ secrets.RCLONE_CONFIG_CONTENT }}
          "@
          $configPath = "C:\Users\RDP\.config\rclone\rclone.conf"
          if (!(Test-Path (Split-Path $configPath))) { New-Item -ItemType Directory -Force -Path (Split-Path $configPath) }
          Set-Content -Path $configPath -Value $configContent
          icacls $configPath /grant "RDP:(R,W)"

      - name: Establish Tailscale Connection
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-win
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Setup Cloud Mounter on Desktop
        run: |
          # FORZIAMO la creazione della cartella Desktop per l'utente RDP
          $desktopPath = "C:\Users\RDP\Desktop"
          if (!(Test-Path $desktopPath)) { New-Item -ItemType Directory -Force -Path $desktopPath }
          
          $batPath = "C:\Users\RDP\Desktop\ATTIVA-GOOGLE-DRIVE.bat"
          $batContent = @"
          @echo off
          echo ===========================================
          echo AVVIO COLLEGAMENTO GOOGLE DRIVE (Z:)
          echo ===========================================
          taskkill /f /im rclone.exe >nul 2>&1
          start /b "" "rclone" mount cla: Z: --vfs-cache-mode full --config "C:\Users\RDP\.config\rclone\rclone.conf"
          echo Attendere 10 secondi per il caricamento...
          timeout /t 10
          if exist Z:\ (
              echo SUCCESSO! Apertura disco Z...
              explorer Z:
          ) else (
              echo ERRORE: Il disco Z non e' apparso. Riprova.
              pause
          )
          exit
          "@
          Set-Content -Path $batPath -Value $batContent
          # Assicuriamoci che l'utente RDP possa vedere il file
          icacls $batPath /grant "RDP:(F)"

      - name: Maintain Connection
        run: |
          Write-Host "`n==============================="
          Write-Host " ACCESSO RDP PRONTO"
          Write-Host " IP: $env:TAILSCALE_IP"
          Write-Host " Utente: RDP"
          Write-Host " Password: $env:RDP_PASS"
          Write-Host "==============================="
          Write-Host " Una volta dentro, fai doppio click su 'ATTIVA-GOOGLE-DRIVE' sul Desktop."
          
          while ($true) {
              Start-Sleep -Seconds 300
          }
s 300
          }
