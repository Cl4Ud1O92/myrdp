name: RDP-Gdrive-Fixed-IP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "Password-Gdrive-2026!" 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tools
        run: choco install tailscale rclone winfsp -y

      - name: Configure Rclone (Safe Path)
        run: |
          $rcloneDir = "C:\rclone_data"
          if (!(Test-Path $rcloneDir)) { New-Item -ItemType Directory -Path $rcloneDir }
          $configContent = @"
          ${{ secrets.RCLONE_CONFIG_CONTENT }}
          "@
          $configPath = Join-Path $rcloneDir "rclone.conf"
          Set-Content -Path $configPath -Value $configContent
          icacls $rcloneDir /grant "Everyone:(OI)(CI)F" /T

      - name: Establish Tailscale Connection (Fixed Hostname)
        run: |
          # Usiamo un hostname fisso. Tailscale assegnerà lo stesso IP a questo nome.
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-fisso --accept-routes
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Setup Cloud Mounter on ALL Desktops
        run: |
          $userProfiles = Get-ChildItem "C:\Users"
          foreach ($profile in $userProfiles) {
              $desktopPath = Join-Path $profile.FullName "Desktop"
              if (Test-Path $desktopPath) {
                  $batPath = Join-Path $desktopPath "ATTIVA-GOOGLE-DRIVE.bat"
                  $batContent = @"
          @echo off
          echo AVVIO GOOGLE DRIVE (Z:)...
          taskkill /f /im rclone.exe >nul 2>&1
          :: Puntiamo alla cartella sbloccata C:\rclone_data
          start /b "" "rclone" mount cla: Z: --vfs-cache-mode full --config "C:\rclone_data\rclone.conf" --vfs-cache-max-size 2G
          echo Attendere 15 secondi per il montaggio...
          timeout /t 15
          if exist Z:\ ( 
              echo SUCCESSO! Apertura disco Z...
              explorer Z: 
          ) else ( 
              echo ERRORE: Disco Z non apparso. Riprova.
              pause 
          )
          exit
          "@
                  Set-Content -Path $batPath -Value $batContent
                  icacls $batPath /grant "Everyone:(F)"
              }
          }

      - name: Maintain Connection
        run: |
          Write-Host "`n==============================="
          Write-Host " INDIRIZZO IP FISSO: $env:TAILSCALE_IP"
          Write-Host " NOME HOST: gh-runner-fisso"
          Write-Host " PASSWORD: $env:RDP_PASS"
          Write-Host "==============================="
          while ($true) { Start-Sleep -Seconds Aperturara
