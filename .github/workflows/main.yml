name: RDP-Gdrive-Final-Fixed-v4

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "Password-Gdrive-2026!" 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tools (Tailscale, Rclone, WinFsp, FileZilla)
        run: |
          # Installiamo FileZilla tramite choco per evitare il blocco 403
          choco install tailscale rclone winfsp filezilla -y

      - name: Configure Rclone (Safe Path)
        run: |
          $rcloneDir = "C:\rclone_data"
          if (!(Test-Path $rcloneDir)) { New-Item -ItemType Directory -Path $rcloneDir }
          $configContent = @"
          ${{ secrets.RCLONE_CONFIG_CONTENT }}
          "@
          Set-Content -Path (Join-Path $rcloneDir "rclone.conf") -Value $configContent
          icacls $rcloneDir /grant "Everyone:(OI)(CI)F" /T

      - name: Establish Tailscale Connection (Identity Force)
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-win --accept-routes --force-reauth
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Setup Desktop Tools and Links
        run: |
          $userProfiles = Get-ChildItem "C:\Users"
          foreach ($profile in $userProfiles) {
              $desktopPath = Join-Path $profile.FullName "Desktop"
              if (Test-Path $desktopPath) {
                  # 1. Script per attivare Google Drive (Z:)
                  $batContent = "@echo off`ntaskkill /f /im rclone.exe >nul 2>&1`nstart /b """" ""rclone"" mount cla: Z: --vfs-cache-mode full --config ""C:\rclone_data\rclone.conf"" --vfs-cache-max-size 2G --links`ntimeout /t 15`nif exist Z:\ ( explorer Z: ) else ( echo Errore: Disco Z non trovato )`nexit"
                  Set-Content -Path (Join-Path $desktopPath "ATTIVA-GOOGLE-DRIVE.bat") -Value $batContent
                  
                  # 2. Link Google Antigravity
                  $shell = New-Object -ComObject WScript.Shell
                  $shortcut = $shell.CreateShortcut("$desktopPath\Google-Antigravity.lnk")
                  $shortcut.TargetPath = "https://antigravity.google/"
                  $shortcut.Save()

                  # 3. Link a FileZilla (già installato via choco)
                  $fzLnk = $shell.CreateShortcut("$desktopPath\FileZilla.lnk")
                  $fzLnk.TargetPath = "C:\Program Files\FileZilla FTP Client\filezilla.exe"
                  $fzLnk.Save()
                  
                  icacls $desktopPath /grant "Everyone:(F)" /T
              }
          }

      - name: Maintain Connection
        run: |
          Write-Host "`n==============================="
          Write-Host " IP FISSO: $env:TAILSCALE_IP"
          Write-Host " UTENTE: RDP"
          Write-Host " PASS: $env:RDP_PASS"
          Write-Host "==============================="
          while ($true) { Start-Sleep -Seconds 300 }
